<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PNG Sequence Preview</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="top">
        <select id="langSelect" class="lang-select" data-i18n-title="langTitle"></select>
        <button id="pick" class="btn-primary" data-i18n="pick" data-i18n-title="pickTitle"></button>
        <input type="file" id="folderInput" webkitdirectory directory multiple hidden>
        <button id="clear" class="btn" data-i18n-title="clearTitle">🗑</button>
        <button id="theme" class="btn" data-i18n-title="themeTitle">🎨</button>
        <div id="root" class="root" title=""></div>
    </div>

    <div id="settings" class="settings" style="display:none">
        <label><span data-i18n="colorPrimary"></span> <input type="color" id="cAccent" value="#5b9dff"></label>
        <label><span data-i18n="colorSecondary"></span> <input type="color" id="cAccent2" value="#9a6cff"></label>
        <label><span data-i18n="colorBg"></span> <input type="color" id="cBg" value="#232323"></label>
        <span class="presets">
            <i class="swatch" data-a="#5b9dff" data-b="#9a6cff" style="background:linear-gradient(90deg,#5b9dff,#9a6cff)"></i>
            <i class="swatch" data-a="#39d98a" data-b="#2bb673" style="background:linear-gradient(90deg,#39d98a,#2bb673)"></i>
            <i class="swatch" data-a="#ff8a5b" data-b="#ff5b9d" style="background:linear-gradient(90deg,#ff8a5b,#ff5b9d)"></i>
            <i class="swatch" data-a="#f5c542" data-b="#ff8a5b" style="background:linear-gradient(90deg,#f5c542,#ff8a5b)"></i>
        </span>
        <button id="themeReset" class="mini" data-i18n="reset"></button>
    </div>

    <div class="main">
        <div class="side">
            <div class="side-head">
                <input id="search" class="search" type="text" data-i18n-ph="searchPh">
                <div class="side-tools">
                    <span id="count" class="badge">0</span>
                    <button id="expandAll" class="mini" data-i18n-title="expandAll">⊞</button>
                    <button id="collapseAll" class="mini" data-i18n-title="collapseAll">⊟</button>
                </div>
            </div>
            <div id="tree" class="tree"></div>
        </div>

        <div class="preview">
            <div id="stage" class="stage">
                <img id="frame" alt="">
                <div id="empty" class="empty" data-i18n="emptyPreview" data-i18n-html="1"></div>
            </div>
            <div id="name" class="name">—</div>
            <div id="info" class="info">0 / 0</div>
            <input id="slider" class="slider" type="range" min="0" max="0" value="0" disabled>
            <div class="controls">
                <button id="prev" class="btn" disabled data-i18n-title="prevTitle">◀</button>
                <button id="play" class="btn" disabled data-i18n="play"></button>
                <button id="next" class="btn" disabled data-i18n-title="nextTitle">▶</button>
                <label class="fps">FPS
                    <input id="fps" type="number" min="1" max="120" value="12">
                </label>
                <label class="autoplay" data-i18n-title="autoplayTitle">
                    <input id="autoplay" type="checkbox" checked> <span data-i18n="autoplay"></span>
                </label>
                <label class="autoplay" data-i18n-title="autoloopTitle">
                    <input id="autoloop" type="checkbox"> <span data-i18n="autoloop"></span>
                </label>
                <button id="loop" class="btn" data-i18n="loop" data-i18n-title="loopTitle"></button>
                <button id="import" class="btn-primary" disabled data-i18n="import"></button>
            </div>
        </div>
    </div>

    <div id="status" class="status"></div>

    <script src="./js/lib/CSInterface.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
